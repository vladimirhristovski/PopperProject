name: Build Singularity Container

on:
  push:
    branches: [ main ]
    paths:
      - 'popper_llama.def'
      - '.github/workflows/build-sif.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget
          APPTAINER_VER="1.3.3"
          wget -q https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VER}/apptainer_${APPTAINER_VER}_amd64.deb
          sudo dpkg -i apptainer_${APPTAINER_VER}_amd64.deb
          apptainer --version

      - name: Build SIF
        run: |
          sudo apptainer build popper_llama.sif popper_llama.def
          ls -lh popper_llama.sif

      - name: Upload SIF to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          pip install -q huggingface_hub
          huggingface-cli login --token $HF_TOKEN
          huggingface-cli repo create popper-llama-container --type dataset --private || true
          huggingface-cli upload $HF_USERNAME/popper-llama-container \
            popper_llama.sif popper_llama.sif \
            --repo-type dataset
          echo "Upload complete!"